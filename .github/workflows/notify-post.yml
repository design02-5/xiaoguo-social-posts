name: Notify New Post

on:
  push:
    branches: [main]
    paths:
      - '社群貼文/*.html'

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build message body
        id: build
        run: |
          FILES=$(git -c core.quotePath=false diff --name-only HEAD^ HEAD -- '社群貼文/*.html')
          BODY="【效果升學書局】今天的貼文已經寫好並推上 GitHub："
          for f in $FILES; do
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$f")
            BODY="${BODY}"$'\n'"https://design02-5.github.io/xiaoguo-social-posts/${ENCODED}"
          done
          BODY="${BODY}"$'\n\n'"📌 記得依每篇HTML裡的「配圖提示詞」區塊手動生圖，存檔後依指定檔名上傳到同一個資料夾"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update index page
        run: |
          python3 scripts/generate_index.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "index.html unchanged, skip commit"
          else
            git commit -m "chore: 自動更新貼文索引頁"
            git push
          fi

      - name: Send LINE notification
        run: |
          MESSAGE=$(jq -n --arg text "${{ steps.build.outputs.body }}" '{messages: [{type: "text", text: $text}]}')
          curl -s -X POST https://api.line.me/v2/bot/message/broadcast \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" \
            -d "$MESSAGE"
