name: Notify New Post

on:
  push:
    branches: [main]
    paths:
      - '社群貼文/*.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Build email body
        id: build
        run: |
          FILES=$(git diff --name-only HEAD^ HEAD -- '社群貼文/*.html')
          BODY="今天的貼文已經寫好並推上 GitHub：\n\n"
          for f in $FILES; do
            ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$f")
            BODY="${BODY}https://design02-5.github.io/xiaoguo-social-posts/${ENCODED}\n"
          done
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "效果升學書局 - 新貼文已產出"
          to: servicexiyuefei01@gmail.com
          from: "效果排程機器人 <${{ secrets.EMAIL_USERNAME }}>"
          body: ${{ steps.build.outputs.body }}
